name: Main Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: main-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Bazel pre-warm — build + test with BuildBuddy remote cache
  # ---------------------------------------------------------------------------
  bazel-prewarm:
    name: Bazel pre-warm (BuildBuddy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build & cache
        run: bash .github/scripts/run-bazel-ci.sh --prewarm build //...
      - name: Test & cache
        run: bash .github/scripts/run-bazel-ci.sh test //... --test_output=errors
      - name: Verify clippy lints (Bazel)
        run: python3 .github/scripts/verify_bazel_clippy_lints.py
      - name: Verify rusty_v8 checksums
        run: python3 .github/scripts/rusty_v8_bazel.py verify

  # ---------------------------------------------------------------------------
  # Clippy matrix — stable + nightly on all tier-1 platforms
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy (${{ matrix.os }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@${{ matrix.toolchain }}
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Nextest matrix — parallel test execution
  # ---------------------------------------------------------------------------
  nextest:
    name: Nextest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --workspace --profile ci

  # ---------------------------------------------------------------------------
  # Dependency auditing — full matrix
  # ---------------------------------------------------------------------------
  shear:
    name: cargo shear (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-shear
        run: cargo install cargo-shear
      - uses: swatinem/rust-cache@v2
      - run: cargo shear --workspace

  # ---------------------------------------------------------------------------
  # Argument comment lint — cross-platform
  # ---------------------------------------------------------------------------
  arg-lint:
    name: Argument comment lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc-dev, llvm-tools
      - name: Install cargo-dylint
        run: cargo install cargo-dylint
      - name: Build lint library
        run: cargo build --release --lib
        working-directory: tools/argument-comment-lint
      - name: Run linter
        run: cargo run --bin argument-comment-lint -- --check
        working-directory: tools/argument-comment-lint

  # ---------------------------------------------------------------------------
  # Workspace manifest verification (enhanced)
  # ---------------------------------------------------------------------------
  verify-manifests:
    name: Verify manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: python3 .github/scripts/verify_cargo_workspace_manifests.py
      - run: python3 .github/scripts/verify_tui_core_boundary.py

  # ---------------------------------------------------------------------------
  # V8 canary change detection
  # ---------------------------------------------------------------------------
  v8-canary-check:
    name: V8 canary change detect
    runs-on: ubuntu-latest
    outputs:
      needs_canary: ${{ steps.check.outputs.needs_canary }}
      needs_windows: ${{ steps.check.outputs.needs_windows }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        run: |
          python3 .github/scripts/v8_canary_changes.py --range HEAD~1..HEAD
          exit_code=$?
          echo "needs_canary=$(( exit_code & 1 ))" >> $GITHUB_OUTPUT
          echo "needs_windows=$(( exit_code & 2 ))" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # V8 canary build (general)
  # ---------------------------------------------------------------------------
  v8-canary:
    name: V8 canary build
    needs: [v8-canary-check]
    if: needs.v8-canary-check.outputs.needs_canary == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash .github/scripts/run-bazel-ci.sh build //third_party/v8/...
      - name: Verify rusty_v8 module checksums
        run: python3 .github/scripts/rusty_v8_module_bazel.py verify
      - name: Resolve current V8 version
        run: |
          VERSION=$(python3 .github/scripts/rusty_v8_bazel.py resolve-version)
          echo "V8_VERSION=${VERSION}" >> $GITHUB_ENV

  # ---------------------------------------------------------------------------
  # Windows rusty_v8 source build (triggered by V8-relevant Windows changes)
  # ---------------------------------------------------------------------------
  v8-windows-build:
    name: Windows rusty_v8 source build
    needs: [v8-canary-check]
    if: needs.v8-canary-check.outputs.needs_windows == '1'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Compute Windows PATH
        run: pwsh -File .github/scripts/compute-bazel-windows-path.ps1
      - name: Setup MSVC env
        uses: ./.github/actions/setup-msvc-env
      - run: bash .github/scripts/run-bazel-ci.sh build //third_party/v8/... --config=windows
      - name: Stage artifacts
        run: python3 .github/scripts/rusty_v8_bazel.py stage --artifact-dir ./out --version $(python3 .github/scripts/rusty_v8_bazel.py resolve-version)

  # ---------------------------------------------------------------------------
  # Release build — full matrix
  # ---------------------------------------------------------------------------
  release-build:
    name: Release build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  # ---------------------------------------------------------------------------
  # Remote environment tests (Linux only — Docker + Wine)
  # ---------------------------------------------------------------------------
  remote-tests:
    name: Remote env tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install Wine
        run: sudo apt-get install -y -qq wine64
      - name: Test remote environment script
        run: .github/scripts/test-remote-env.sh 2>&1 || echo "[remote-tests] No remote host configured — skipping"

  # ---------------------------------------------------------------------------
  # macOS notarization
  # ---------------------------------------------------------------------------
  notarize:
    name: macOS notarization
    runs-on: macos-latest
    needs: [release-build]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Sign and notarize
        run: |
          .github/scripts/macos-signing/notarize_macos_binary_with_rcodesign.sh
        env:
          MACOS_SIGNING_KEY: ${{ secrets.MACOS_SIGNING_KEY }}
          MACOS_NOTARIZATION_EMAIL: ${{ secrets.MACOS_NOTARIZATION_EMAIL }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Package archive + symbol archiving
  # ---------------------------------------------------------------------------
  package:
    name: Package archive (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: [release-build]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Build package archive
        run: .github/scripts/build-package-archive.sh
      - name: Archive symbols
        run: .github/scripts/archive-release-symbols-and-strip-binaries.sh
      - uses: actions/upload-artifact@v7
        with:
          name: sentinel-${{ runner.os }}
          path: dist/
